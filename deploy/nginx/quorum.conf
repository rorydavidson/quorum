# Quorum Governance Portal — nginx reverse proxy
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/quorum.conf
#   2. Replace QUORUM_DOMAIN with your actual domain (or run setup.sh which does this)
#   3. Replace TLS cert paths or use certbot
#   4. ln -s /etc/nginx/sites-available/quorum.conf /etc/nginx/sites-enabled/
#   5. nginx -t && systemctl reload nginx

# Rate limiting zone for auth routes
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

# Upstream definitions
upstream quorum_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream quorum_bff {
    server 127.0.0.1:3001;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name QUORUM_DOMAIN;

    # Allow certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name QUORUM_DOMAIN;

    # TLS configuration — replace paths or use certbot --nginx
    ssl_certificate     /etc/letsencrypt/live/QUORUM_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/QUORUM_DOMAIN/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (comment out if not ready to commit)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Security headers (supplement what helmet sets on the BFF)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request size limit (for document uploads via Next.js → BFF)
    client_max_body_size 50M;

    # ── BFF-direct routes ────────────────────────────────────────────────────
    # The browser hits /auth/* directly during Keycloak OIDC redirects.
    # All other API calls go through Next.js /api/* routes which proxy to
    # the BFF server-to-server — do NOT route /documents, /calendar etc.
    # directly to the BFF here.

    location /auth/ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://quorum_bff;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /health {
        proxy_pass http://quorum_bff;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;  # Don't log health checks
    }

    # ── Next.js static assets (long cache, immutable content-hash filenames) ─
    location /_next/static/ {
        proxy_pass http://quorum_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Everything else → Next.js ────────────────────────────────────────────
    location / {
        proxy_pass http://quorum_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Large file downloads may take time (proxied through Next.js → BFF → Drive)
        proxy_read_timeout 120s;
    }
}
