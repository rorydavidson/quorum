# Quorum Governance Portal — Docker nginx reverse proxy
#
# Adapted from deploy/nginx/quorum.conf for Docker Compose networking.
# Upstream hostnames use Docker service names instead of 127.0.0.1.
#
# For production TLS: uncomment the HTTPS server block below and
# mount certificates at /etc/nginx/certs/ via docker-compose volume.

# Rate limiting zone for auth routes
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

# Upstream definitions — Docker service names resolve via internal DNS
upstream quorum_web {
    server web:3000;
    keepalive 16;
}

upstream quorum_bff {
    server bff:3001;
    keepalive 16;
}

# ── HTTP server ─────────────────────────────────────────────────────────────
# Serves traffic directly for local dev (no TLS).
# In production with TLS: change this to redirect to HTTPS (see comments below).
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (production cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── BFF-direct routes (browser hits these during Keycloak OIDC flow) ────
    location /auth/ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://quorum_bff;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /health {
        proxy_pass http://quorum_bff;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── Next.js static assets (immutable content-hash filenames) ────────────
    location /_next/static/ {
        proxy_pass http://quorum_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Everything else → Next.js ───────────────────────────────────────────
    location / {
        proxy_pass http://quorum_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Large file downloads may take time (proxied through Next.js → BFF → Drive)
        proxy_read_timeout 120s;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request size limit (for document uploads via Next.js → BFF)
    client_max_body_size 50M;
}

