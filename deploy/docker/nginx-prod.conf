# Quorum Governance Portal — nginx (HTTPS, production)
#
# Activated by docker-compose.prod.yml, which mounts this file in place
# of nginx.conf. Requires a valid Let's Encrypt certificate at the paths
# below (issued by certbot-init before first use).
#
# !! Replace CHANGE_ME_DOMAIN with your actual domain in all four places !!

limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

upstream quorum_web {
    server web:3000;
    keepalive 16;
}

upstream quorum_bff {
    server bff:3001;
    keepalive 16;
}

# ── HTTP — ACME challenge passthrough + permanent redirect to HTTPS ──────────
server {
    listen 80;
    listen [::]:80;
    server_name CHANGE_ME_DOMAIN;

    # Must stay on HTTP so certbot can renew via webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name CHANGE_ME_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/CHANGE_ME_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CHANGE_ME_DOMAIN/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    # ── BFF-direct routes (browser hits these during Keycloak OIDC flow) ────
    location /auth/ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://quorum_bff;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /health {
        proxy_pass http://quorum_bff;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── Next.js static assets (immutable content-hash filenames) ────────────
    location /_next/static/ {
        proxy_pass http://quorum_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Everything else → Next.js ────────────────────────────────────────────
    location / {
        proxy_pass http://quorum_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }
}
